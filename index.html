<!DOCTYPE html>
<!-- index.html: Sayfanın iskeleti. Tüm yapı burada başlar. -->
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Araçları Paneli</title>

  <!-- Görünümü buradan bağlıyoruz (style.css) -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>🤖 AI Araçları Paneli</h1>
    <p>Yapay zeka araçlarını tek ekranda toplayan basit bir panel.</p>
  </header>

  <!-- Arama kutusu: kendi başına anlamlı bir bölüm olduğu için <section>. -->
  <section class="arama-alani">
    <input
      type="text"
      id="arama"
      class="arama-kutusu"
      placeholder="Araç ara... (örn. chat)"
    />
  </section>

  <!-- Sayfanın ana içeriği: kartları app.js içindeki renderTools() dolduracak.
       DİKKAT: Arama kutusu buraya konmaz; renderTools() <main> içini siler. -->
  <main></main>

  <!-- Alt bilgi: proje hakkında kısa not. -->
  <footer class="alt-bilgi">
    <p>AI Araçları Paneli · Yazılım eğitimi 1. hafta projesi</p>
  </footer>

  <!-- Davranışı (JavaScript) sayfanın en sonunda bağlıyoruz -->
  <script src="app.js"></script>
</body>
</html>
